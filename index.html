<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riftbound — Base de Datos Interactiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#0b0c0f; --surface:#111318; --surface2:#181b22;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#e8e6e0; --muted:#6b6a65; --dim:#3a3935;
  --blue:#4a9eff; --blue-bg:rgba(74,158,255,0.10);
  --green:#3ecf8e; --green-bg:rgba(62,207,142,0.10);
  --amber:#f4a535; --amber-bg:rgba(244,165,53,0.10);
  --pink:#e879a0; --pink-bg:rgba(232,121,160,0.10);
  --red:#f05252; --red-bg:rgba(240,82,82,0.10);
  --s1:#4a9eff; --s2:#3ecf8e; --s3:#f4a535; --s4:#e879a0; --s5:#a78bfa;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; padding:0; overflow-x:hidden;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--dim); border-radius:3px; }

/* LAYOUT */
.app { display:flex; min-height:100vh; }
.sidebar {
  width:235px; flex-shrink:0; background:var(--surface);
  border-right:1px solid var(--border); padding:1.5rem 0;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.sidebar-logo {
  font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800;
  padding:0 1.25rem 1.25rem; border-bottom:1px solid var(--border);
  margin-bottom:1rem;
}
.sidebar-logo span { color:var(--blue); }
.sidebar-logo small { display:block; font-size:.6rem; font-weight:400; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:.03em; margin-top:2px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:.6rem 1.25rem; cursor:pointer; font-size:.8rem;
  color:var(--muted); transition:.15s; border-left:3px solid transparent;
}
.nav-item:hover { color:var(--text); background:var(--surface2); }
.nav-item.active { color:var(--text); border-left-color:var(--nav-c,var(--blue)); background:var(--surface2); }
.nav-item .nav-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.main {
  flex:1; padding:1.5rem 2rem 4rem; max-width:1200px;
}

/* SECTIONS */
.section { display:none; }
.section.active { display:block; }

.sec-label {
  font-family:'DM Mono',monospace; font-size:.68rem; letter-spacing:.12em;
  text-transform:uppercase; color:var(--muted);
  margin:2rem 0 .75rem; display:flex; align-items:center; gap:.6rem;
}
.sec-label::after {
  content:''; flex:1; height:1px; background:var(--border);
}

/* HEADER */
.set-header {
  display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
  margin-bottom:1.5rem; padding-bottom:1rem;
  border-bottom:1px solid var(--border);
}
.set-header h2 { font-family:'DM Sans',sans-serif; font-size:1.5rem; font-weight:700; line-height:1.2; padding:.35rem .05rem; }
.set-header .set-badge {
  font-family:'DM Mono',monospace; font-size:.7rem; font-weight:500;
  padding:.25rem .7rem; border-radius:20px; border:1px solid; letter-spacing:.04em;
}
.set-header .set-date { font-size:.8rem; color:var(--muted); }
.set-header .set-total { margin-left:auto; font-size:.9rem; color:var(--muted); }
.set-header .set-total strong { color:var(--text); font-family:'Syne',sans-serif; }

/* METRIC CARDS */
.metrics-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; margin-bottom:1.5rem; }
.mcard {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:.8rem 1rem; position:relative; overflow:hidden;
}
.mcard::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:2px; background:var(--accent,var(--blue));
}
.mcard-label { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--muted); letter-spacing:.05em; margin-bottom:.3rem; }
.mcard-num { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; line-height:1; }
.mcard-sub { font-size:.7rem; color:var(--muted); margin-top:.25rem; line-height:1.4; }
.mechanics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:8px; margin-top:1rem; }
.mechanic-card {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:.8rem 1rem; position:relative; overflow:hidden;
}
.mechanic-card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:2px; background:var(--accent,var(--blue));
}
.mechanic-kicker {
  font-family:'DM Mono',monospace; font-size:.62rem; color:var(--muted);
  letter-spacing:.06em; text-transform:uppercase; margin-bottom:.25rem;
}
.mechanic-name { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; line-height:1.1; }
.mechanic-desc { font-size:.72rem; color:var(--muted); margin-top:.35rem; line-height:1.45; }

/* LEGEND CARDS GRID */
.legend-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px;
}
.legend-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; cursor:pointer; transition:transform .15s, box-shadow .15s;
}
.legend-card:hover { transform:translateY(-2px); box-shadow:0 4px 20px rgba(0,0,0,0.3); }
.legend-card .lc-img {
  width:100%; aspect-ratio:5/7; background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.legend-card .lc-img img { width:100%; height:100%; object-fit:cover; }
.legend-card .lc-img .placeholder {
  font-size:2rem; opacity:.3; font-family:'Syne',sans-serif;
}
.legend-card .lc-info { padding:.5rem .65rem .6rem; }
.legend-card .lc-name { font-size:.75rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.legend-card .lc-sub { font-size:.62rem; color:var(--muted); margin-top:2px; }
.legend-card .lc-set {
  display:inline-block; font-size:.55rem; font-family:'DM Mono',monospace;
  padding:.12rem .4rem; border-radius:10px; margin-top:4px; font-weight:500;
}
.legend-card .lc-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.legend-card .lc-tags .lc-set { margin-top:0; }
.legend-card .lc-price { font-size:.62rem; color:var(--green); margin-top:3px; font-weight:500; }
.empty-state {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:1rem; color:var(--muted); font-size:.78rem; line-height:1.45;
}
.count-note {
  font-family:'DM Mono',monospace; font-size:.68rem; color:var(--muted);
  margin-bottom:.75rem;
}

/* MODAL */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
.modal-overlay.active { display:flex; }
.modal {
  background:var(--surface2); border:1px solid var(--border2); border-radius:14px;
  max-width:520px; width:90%; max-height:85vh; overflow-y:auto;
  padding:1.5rem; position:relative;
}
.modal-close {
  position:absolute; top:.75rem; right:.75rem; background:none; border:none;
  color:var(--muted); font-size:1.2rem; cursor:pointer; padding:.25rem; line-height:1;
}
.modal-close:hover { color:var(--text); }
.modal-body { display:flex; gap:1.25rem; align-items:flex-start; }
.modal-img { width:180px; flex-shrink:0; border-radius:8px; overflow:hidden; background:var(--surface); }
.modal-img img { width:100%; display:block; }
.modal-img .placeholder { padding:2rem 0; text-align:center; font-size:3rem; opacity:.3; }
.modal-info { flex:1; min-width:0; }
.modal-info h3 { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; }
.modal-info .mod-set { font-size:.75rem; color:var(--muted); margin:.2rem 0 .5rem; font-family:'DM Mono',monospace; }
.modal-info .mod-desc { font-size:.82rem; line-height:1.5; color:var(--text); opacity:.85; }
.modal-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:.6rem; }
.modal-tags span {
  font-size:.65rem; font-family:'DM Mono',monospace; padding:.15rem .5rem;
  border-radius:12px; background:var(--surface); color:var(--muted);
}

.modal-price {
  margin-top:.7rem; padding-top:.6rem; border-top:1px solid var(--border);
}
.price-label {
  font-family:'DM Mono',monospace; font-size:.6rem; color:var(--muted);
  letter-spacing:.06em; text-transform:uppercase; margin-bottom:.2rem;
}
.price-value { font-size:.82rem; }
.price-value .pl-l { color:var(--muted); font-size:.72rem; }
.price-value .pl-f { color:var(--green); font-weight:600; }
.price-value .pl-e { color:var(--red); font-size:.7rem; }
.price-value .pl-a { color:var(--blue); font-size:.7rem; cursor:pointer; text-decoration:underline; }
.price-value .pl-na { color:var(--muted); font-size:.7rem; }

/* PACK ANATOMY */
.pack-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.pack-slot {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:.75rem .6rem; text-align:center; position:relative; overflow:hidden;
}
.pack-slot::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:2px; background:var(--accent,#888780);
}
.pack-slot .slot-count { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; line-height:1; color:var(--accent,#888780); }
.pack-slot .slot-name { font-size:.65rem; color:var(--muted); margin-top:.2rem; line-height:1.3; }

/* TABLES */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:.8rem; }
th {
  text-align:left; padding:.5rem .75rem; font-family:'DM Mono',monospace; font-size:.65rem;
  letter-spacing:.06em; color:var(--muted); border-bottom:1px solid var(--border2);
  background:var(--surface); position:sticky; top:0;
}
td { padding:.6rem .75rem; border-bottom:1px solid var(--border); color:var(--text); }
tbody tr:hover td { background:var(--surface2); }
.row-label { font-weight:500; white-space:nowrap; }

/* PILLS */
.pill {
  display:inline-block; font-family:'DM Mono',monospace; font-size:.65rem;
  padding:.2rem .55rem; border-radius:20px; font-weight:500; white-space:nowrap;
}
.pill-blue  { background:var(--blue-bg);  color:var(--blue); }
.pill-green { background:var(--green-bg); color:var(--green); }
.pill-amber { background:var(--amber-bg); color:var(--amber); }
.pill-pink  { background:var(--pink-bg);  color:var(--pink); }
.pill-red   { background:var(--red-bg);   color:var(--red); }
.pill-dim   { background:var(--surface2); color:var(--muted); }
.pill-sub   { font-size:.6rem; color:var(--muted); margin-top:3px; display:block; }
.tbd        { color:var(--dim); font-style:italic; font-size:.72rem; }

/* CHARTS */
.chart-box {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:1rem; margin-bottom:1rem;
}
.chart-title {
  font-family:'Syne',sans-serif; font-size:.85rem; font-weight:600;
  margin-bottom:.75rem;
}
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }

/* FOOTER */
.footnote {
  margin-top:2.5rem; padding-top:1rem; border-top:1px solid var(--border);
  font-size:.7rem; color:var(--muted); font-family:'DM Mono',monospace;
  letter-spacing:.03em; line-height:1.7;
}
.footnote strong { color:var(--dim); }

/* TABS */
.sub-tabs { display:flex; gap:4px; margin-bottom:1rem; flex-wrap:wrap; }
.sub-tab {
  padding:.4rem 1rem; font-size:.72rem; font-family:'DM Mono',monospace;
  border:1px solid var(--border); border-radius:20px; cursor:pointer;
  background:var(--surface); color:var(--muted); transition:.12s;
}
.sub-tab:hover { color:var(--text); border-color:var(--border2); }
.sub-tab.active { background:var(--surface2); color:var(--text); border-color:var(--dim); }
.sub-tab-content { display:none; }
.sub-tab-content.active { display:block; }

/* SEARCH */
.search-bar {
  display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap;
}
.global-search-bar {
  margin-bottom:1.25rem;
}
.global-search-bar input {
  width:100%; padding:.6rem 1rem; font-size:.85rem;
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  color:var(--text); font-family:'DM Sans',sans-serif;
}
.global-search-bar input:focus { outline:none; border-color:var(--blue); }
.global-search-bar input::placeholder { color:var(--dim); }
.global-results { display:none; margin-bottom:1.5rem; }
.global-results.active { display:block; }
.global-results .legend-grid { max-height:70vh; overflow-y:auto; }
.search-bar input {
  flex:1; min-width:180px; padding:.5rem .75rem; font-size:.78rem;
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'DM Sans',sans-serif;
}
.search-bar input:focus { outline:none; border-color:var(--dim); }
.search-bar select {
  padding:.5rem .75rem; font-size:.72rem; background:var(--surface);
  border:1px solid var(--border); border-radius:8px; color:var(--text);
  font-family:'DM Mono',monospace; cursor:pointer;
}

/* === RESPONSIVE === */

/* Tablet / small desktop (768–1024) */
@media(max-width:1024px){
  .sidebar { width:195px; }
  .main { padding:1.25rem 1.25rem 3rem; }
}

/* Medium / landscape phones (640–768): compact top bar */
@media(max-width:768px){
  .app { display:block; }
  .sidebar {
    width:100%; height:auto; max-height:none; position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:3px; overflow-x:auto; overflow-y:hidden;
    padding:.45rem .5rem; border-right:none; border-bottom:1px solid var(--border);
  }
  .sidebar-logo {
    flex:0 0 auto; padding:0 .5rem 0 0; margin:0 .25rem 0 0;
    border-bottom:none; border-right:1px solid var(--border);
    font-size:.85rem; line-height:1;
  }
  .sidebar-logo small { display:none; }
  .nav-item {
    flex:0 0 auto; border-left:none; border-bottom:2px solid transparent;
    padding:.35rem .5rem; border-radius:6px; gap:5px; font-size:.65rem;
  }
  .nav-item.active { border-left-color:transparent; border-bottom-color:var(--nav-c,var(--blue)); }
  .nav-item .nav-dot { width:6px; height:6px; }
  .main { width:100%; max-width:none; padding:.75rem .7rem 2.5rem; }
  .set-header { display:grid; grid-template-columns:1fr auto; gap:.4rem .5rem; align-items:center; }
  .set-header h2 { font-size:1.25rem; grid-column:1 / -1; }
  .set-header .set-total { margin-left:0; grid-column:1 / -1; font-size:.72rem; }
  .sec-label { margin:1.25rem 0 .5rem; font-size:.6rem; letter-spacing:.08em; }
  .metrics-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px; }
  .mcard { padding:.65rem .7rem; border-radius:8px; }
  .mcard-num { font-size:1.25rem; }
  .mcard-label { font-size:.58rem; }
  .mcard-sub { font-size:.62rem; }
  .mechanics-grid { grid-template-columns:1fr; }
  .sub-tabs { flex-wrap:nowrap; overflow-x:auto; padding-bottom:.2rem; scrollbar-width:none; }
  .sub-tabs::-webkit-scrollbar { display:none; }
  .sub-tab { flex:0 0 auto; padding:.35rem .7rem; font-size:.65rem; }
  .search-bar { display:grid; grid-template-columns:1fr; gap:6px; }
  .search-bar input, .search-bar select { width:100%; min-width:0; }
  .search-bar select.sort-price { min-width:0; }
  .two-col { grid-template-columns:1fr; }
  .pack-grid { grid-template-columns:repeat(3,1fr); }
  .legend-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; }
  .legend-card { border-radius:8px; }
  .legend-card:hover { transform:none; }
  .legend-card .lc-info { padding:.4rem .5rem .5rem; }
  .legend-card .lc-name { white-space:normal; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; min-height:2.1em; font-size:.68rem; }
  .legend-card .lc-sub { font-size:.56rem; line-height:1.3; }
  .legend-card .lc-price { font-size:.58rem; }
  .chart-box { padding:.7rem; border-radius:8px; }
  .chart-box > div[style*="height"] { height:180px !important; }
  .modal-overlay { align-items:flex-start; padding:.8rem .5rem; overflow-y:auto; }
  .modal { width:100%; max-height:none; padding:.9rem; border-radius:10px; }
  .modal-body { flex-direction:column; align-items:center; gap:.75rem; }
  .modal-img { width:min(68vw,200px); }
  .modal-info { width:100%; }
  .modal-info h3 { font-size:.95rem; padding-right:1.5rem; }
}

/* Phones (< 640px): horizontally scrollable nav bar with full labels */
@media(max-width:639px){
  .sidebar {
    display:flex !important; position:sticky; top:0; width:100%; height:auto;
    flex-direction:row !important; align-items:center; flex-wrap:nowrap !important;
    padding:.5rem .65rem; gap:4px;
    border-right:none !important; border-bottom:1px solid var(--border);
    background:var(--surface); z-index:50;
    overflow-x:auto; overflow-y:hidden;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .sidebar::-webkit-scrollbar { display:none; }
  #nav-container {
    display:flex !important; flex-direction:row !important; align-items:center;
    flex-wrap:nowrap; gap:4px;
  }
  .sidebar-logo { display:none !important; }
  .nav-item {
    display:flex !important; flex:0 0 auto !important; flex-direction:row !important;
    align-items:center; justify-content:center;
    border-left:none !important; border-bottom:3px solid transparent;
    padding:.35rem .65rem; border-radius:8px; gap:6px; font-size:.75rem; line-height:1.3;
    white-space:nowrap;
  }
  .nav-item.active { border-left-color:transparent !important; border-bottom-color:var(--nav-c,var(--blue)); background:transparent; }
  .nav-item .nav-dot { width:8px; height:8px; flex-shrink:0; }
  .app { padding-bottom:0; }
  .main { padding:0 .5rem 1.5rem; }
  .global-search-bar { margin:.2rem 0 .35rem; }
  .global-search-bar input { font-size:.72rem; padding:.4rem .65rem; border-radius:8px; }
  .set-header { grid-template-columns:1fr; gap:.3rem; }
  .set-header h2 { font-size:1rem; grid-column:1; }
  .set-header .set-total { margin-left:0; grid-column:1; font-size:.68rem; }
  .set-header .set-badge { font-size:.58rem; }
  .set-header .set-date { font-size:.68rem; }
  .pack-grid { grid-template-columns:1fr 1fr; gap:4px; }
  .pack-slot { padding:.4rem .35rem; border-radius:6px; }
  .pack-slot .slot-count { font-size:1.1rem; }
  .pack-slot .slot-name { font-size:.52rem; }
  .metrics-grid { gap:4px; }
  .mcard { padding:.45rem .5rem; border-radius:6px; }
  .mcard-num { font-size:1rem; }
  .mcard-label { font-size:.52rem; }
  .mcard-sub { font-size:.55rem; }
  .legend-grid { gap:5px; }
  .legend-card { border-radius:6px; }
  .legend-card .lc-info { padding:.3rem .35rem .35rem; }
  .legend-card .lc-name { font-size:.6rem; }
  .legend-card .lc-sub { font-size:.5rem; }
  .legend-card .lc-price { font-size:.52rem; }
  .legend-card .lc-set { font-size:.48rem; }
  .sec-label { margin:1rem 0 .4rem; font-size:.55rem; }
  .sub-tab { padding:.3rem .6rem; font-size:.6rem; }
  .modal { padding:.65rem; border-radius:8px; }
  .modal-img { width:min(75vw,160px); }
  .modal-info h3 { font-size:.85rem; }
  .modal-info .mod-desc { font-size:.72rem; }
  .chart-box { padding:.55rem; }
  .chart-box > div[style*="height"] { height:150px !important; }
  .footnote { font-size:.6rem; }
  .table-wrap table { font-size:.68rem; }
  .count-note { font-size:.58rem; }
  .empty-state { font-size:.68rem; padding:.7rem; }
}

/* Very small phones (< 420px) */
@media(max-width:420px){
  .sidebar { min-height:36px; padding:.4rem .45rem; }
  .nav-item { padding:.3rem .45rem; font-size:.7rem; gap:5px; }
  .nav-item .nav-dot { width:7px; height:7px; }
  .main { padding:0 .4rem 1rem; }
  .global-search-bar { margin:.15rem 0 .25rem; }
  .set-header h2 { font-size:.9rem; }
  .metrics-grid { grid-template-columns:1fr 1fr; }
  .legend-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:4px; }
  .pack-grid { grid-template-columns:1fr 1fr; gap:3px; }
  .mcard { padding:.35rem .4rem; }
  .mcard-num { font-size:.85rem; }
  .mcard-label { font-size:.48rem; }
  .modal-img { width:70vw; }
}

/* Tiny screens (< 360px) */
@media(max-width:360px){

  .pack-grid { grid-template-columns:1fr; }

</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      Rift<span>bound</span>
      <small>Vinci - Base de datos TCG</small>
    </div>
    <div id="nav-container"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="main" id="sec-container"></div>

    <!-- ===== PULL RATES ===== -->
    <div class="section" id="sec-rates">
      <div class="set-header">
        <h2>Pull Rates</h2>
        <span class="set-badge" style="color:var(--pink);border-color:var(--pink);">Comparativa</span>
      </div>

      <div class="sec-label">Por caja (24 packs)</div>
      <div class="table-wrap">
        <table>
          <thead id="pr-head"><tr><th style="min-width:130px">Tipo de carta</th></tr></thead>
          <tbody id="pr-body"></tbody>
        </table>
      </div>

      <div class="sec-label">Gráficas de probabilidad</div>
      <div class="two-col">
        <div class="chart-box">
          <div class="chart-title">% de conseguir 1+ pull por caja (24 packs)</div>
          <div style="position:relative;height:200px;"><canvas id="probChartRates"></canvas></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">Packs necesarios (media) para 1 pull</div>
          <div style="position:relative;height:200px;"><canvas id="packsChartRates"></canvas></div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-body">
      <div class="modal-img" id="modal-img"><div class="placeholder">🃏</div></div>
      <div class="modal-info">
        <h3 id="modal-name"></h3>
        <div class="mod-set" id="modal-set"></div>
        <div class="mod-desc" id="modal-desc"></div>
        <div class="modal-tags" id="modal-tags"></div>
        <div class="modal-price" id="modal-price">
          <div class="price-label">Cardmarket</div>
          <div class="price-value" id="price-value"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="epic-cards.js"></script>
<script>
let LEGEND_DATA = {};

// ===== DATA =====
const SETS = {};

// ===== RENDER LEGENDS =====
function renderSet(setId) {
  const set = SETS[setId];
  const grid = document.getElementById('grid-'+setId[0]);
  if(!grid) return;
  grid.innerHTML = '';
  set.legends.forEach((leg,i)=>{
    const card = document.createElement('div');
    card.className = 'legend-card';
    card.setAttribute('data-name',leg.name.toLowerCase());

    // Build img
    const imgDiv = document.createElement('div');
    imgDiv.className = 'lc-img';
    let imgUrl = leg.img || null;
    if (imgUrl) {
      const img = document.createElement('img');
      img.src = imgUrl;
      img.alt = leg.name;
      img.loading = 'lazy';
      img.onerror = function(){ this.style.display='none'; this.parentElement.innerHTML='<div class=\"placeholder\">?</div>'; };
      imgDiv.appendChild(img);
    } else {
      imgDiv.innerHTML = '<div class="placeholder">?</div>';
    }

    const cmPrice = CARDMARKET_PRICES[setId]?.[leg.name] || null;
    const info = document.createElement('div');
    info.className = 'lc-info';
    info.innerHTML = `<div class="lc-name">${leg.name}</div>
      <div class="lc-sub">${leg.title||leg.n}</div>
      <span class="lc-set" style="background:color-mix(in srgb,${set.color},transparent 80%);color:var(--text)">${set.abbr}</span>
      ${cmPrice ? `<div class="lc-price">${cmPrice}</div>` : ''}`;

    card.appendChild(imgDiv);
    card.appendChild(info);
    card.onclick = ()=>openModal(leg,set);
    grid.appendChild(card);
  });
}

// ===== FILTER =====
function filterLegends(setId, query) {
  const grid = document.getElementById('grid-'+setId);
  if(!grid) return;
  const q = query.toLowerCase().trim();
  grid.querySelectorAll('.legend-card').forEach(c=>{
    const name = c.getAttribute('data-name')||'';
    c.style.display = (!q || name.includes(q)) ? '' : 'none';
  });
}

// ===== PREMIUM CARDS =====
const PREMIUM_SET_PREFIX = {};

function premiumLabel(card) {
  if(card.signature) return 'Signature';
  if(card.ovr) return 'OVR';
  if(card.alt) return 'Alt-Art';
  return card.rarity;
}

function renderPremiumSet(setCode) {
  const prefix = PREMIUM_SET_PREFIX[setCode];
  const grid = document.getElementById('grid-epic-'+prefix);
  if(!grid) return;

  const cards = (window.EPIC_CARD_DATA && window.EPIC_CARD_DATA[setCode]) || [];
  const count = document.getElementById('epic-count-'+prefix);
  grid.innerHTML = '';

  if(count) count.textContent = cards.length ? `${cards.length} cartas Epic / Showcase / OVR` : '';
  if(!cards.length) {
    grid.innerHTML = '<div class="empty-state">No hay cartas disponibles todavia para esta coleccion.</div>';
    return;
  }

  const set = Object.values(SETS).find(s => s.abbr===setCode);
  cards.forEach(card=>{
    const el = document.createElement('div');
    el.className = 'legend-card';
    el.setAttribute('data-name', `${card.name} ${card.type} ${card.domain}`.toLowerCase());
    el.setAttribute('data-rarity', card.rarity);
    const cmPrice = CARDMARKET_PRICES[set.id]?.[card.id] || CARDMARKET_PRICES[set.id]?.[card.id.replace(/-\w+$/, '')] || CARDMARKET_PRICES[set.id]?.[card.name] || null;
    el.setAttribute('data-price', cmPrice ? parseFloat(cmPrice.replace('€','')) : '');
    const imgDiv = document.createElement('div');
    imgDiv.className = 'lc-img';
    const img = document.createElement('img');
    img.src = card.image;
    img.alt = card.name;
    img.loading = 'lazy';
    img.onerror = function(){ this.style.display='none'; this.parentElement.innerHTML='<div class="placeholder">?</div>'; };
    imgDiv.appendChild(img);

    const info = document.createElement('div');
    info.className = 'lc-info';
    info.innerHTML = `<div class="lc-name">${card.name}</div>
      <div class="lc-sub">#${card.number} · ${card.type}${card.domain ? ' · '+card.domain : ''}</div>
      <div class="lc-tags">
        <span class="lc-set" style="background:color-mix(in srgb,${set.color},transparent 80%);color:var(--text)">${set.abbr}</span>
        <span class="lc-set" style="background:var(--surface2);color:var(--muted)">${premiumLabel(card)}</span>
      </div>
      ${cmPrice ? `<div class="lc-price">${cmPrice}</div>` : ''}`;

    el.appendChild(imgDiv);
    el.appendChild(info);
    el.onclick = ()=>openPremiumModal(card,set);
    grid.appendChild(el);
  });
}

function filterPremium(prefix) {
  const tab = document.getElementById('tab-epic-'+prefix);
  const grid = document.getElementById('grid-epic-'+prefix);
  if(!tab || !grid) return;
  const query = (tab.querySelector('input')?.value || '').toLowerCase().trim();
  const rarity = tab.querySelector('select')?.value || '';
  const sort = tab.querySelector('.sort-price')?.value || '';
  const cards = [...grid.querySelectorAll('.legend-card')];
  cards.forEach(card=>{
    const matchesQuery = !query || (card.getAttribute('data-name') || '').includes(query);
    const matchesRarity = !rarity || card.getAttribute('data-rarity') === rarity;
    card.style.display = matchesQuery && matchesRarity ? '' : 'none';
    card.dataset._visible = matchesQuery && matchesRarity ? '1' : '0';
  });
  if (sort) {
    const visible = cards.filter(c => c.dataset._visible === '1');
    visible.sort((a, b) => {
      const pa = parseFloat(a.getAttribute('data-price')) || 0;
      const pb = parseFloat(b.getAttribute('data-price')) || 0;
      return sort === 'asc' ? pa - pb : pb - pa;
    });
    visible.forEach(el => grid.appendChild(el));
  }
}

// ===== GLOBAL SEARCH =====
function globalSearch() {
  const q = (document.getElementById('global-search-input')?.value || '').trim().toLowerCase();
  const grid = document.getElementById('global-results-grid');
  const container = document.getElementById('global-results');
  if (!grid || !container) return;

  // Show/hide sections and search results
  container.classList.toggle('active', !!q);
  if (q) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  } else {
    const activeNav = document.querySelector('.nav-item.active');
    const setId = activeNav ? activeNav.dataset.set : 'all';
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + setId));
  }

  if (!q) { grid.innerHTML = ''; return; }

  grid.innerHTML = '';
  const results = [];

  // Search legends
  for (const setId of Object.keys(SETS)) {
    const set = SETS[setId];
    for (const leg of set.legends) {
      if (leg.name.toLowerCase().includes(q)) {
        results.push({ type:'legend', set, leg });
      }
    }
  }

  // Search epic+ cards
  for (const setCode of Object.keys(PREMIUM_SET_PREFIX)) {
    const cards = (window.EPIC_CARD_DATA && window.EPIC_CARD_DATA[setCode]) || [];
    const set = Object.values(SETS).find(s => s.abbr === setCode);
    if (!set) continue;
    for (const card of cards) {
      if (card.name.toLowerCase().includes(q) || card.type.toLowerCase().includes(q)) {
        results.push({ type:'epic', set, card });
      }
    }
  }

  if (!results.length) {
    grid.innerHTML = `<div class="empty-state">No se encontraron resultados para "${q}".</div>`;
    return;
  }

  for (const r of results) {
    const el = document.createElement('div');
    el.className = 'legend-card';

    const imgDiv = document.createElement('div');
    imgDiv.className = 'lc-img';
    if (r.type === 'legend') {
      let imgUrl = r.leg.img || null;
      if (imgUrl) {
        const img = document.createElement('img'); img.src = imgUrl; img.alt = r.leg.name; img.loading = 'lazy';
        img.onerror = function(){ this.style.display='none'; this.parentElement.innerHTML='<div class="placeholder">?</div>'; };
        imgDiv.appendChild(img);
      } else {
        imgDiv.innerHTML = '<div class="placeholder">?</div>';
      }
    } else {
      const img = document.createElement('img'); img.src = r.card.image; img.alt = r.card.name; img.loading = 'lazy';
      img.onerror = function(){ this.style.display='none'; this.parentElement.innerHTML='<div class="placeholder">?</div>'; };
      imgDiv.appendChild(img);
    }

    const cmPrice = r.type === 'legend'
      ? (CARDMARKET_PRICES[r.set.id]?.[r.leg.name] || null)
      : (CARDMARKET_PRICES[r.set.id]?.[r.card.id] || CARDMARKET_PRICES[r.set.id]?.[r.card.name] || null);

    const info = document.createElement('div');
    info.className = 'lc-info';
    if (r.type === 'legend') {
      info.innerHTML = `<div class="lc-name">${r.leg.name}</div>
        <div class="lc-sub">${r.set.abbr} · Leyenda</div>
        <span class="lc-set" style="background:color-mix(in srgb,${r.set.color},transparent 80%);color:var(--text)">${r.set.abbr}</span>
        ${cmPrice ? `<div class="lc-price">${cmPrice}</div>` : ''}`;
      el.onclick = ()=>openModal(r.leg, r.set);
    } else {
      const label = r.card.signature ? 'Signature' : r.card.ovr ? 'OVR' : r.card.alt ? 'Alt-Art' : r.card.rarity;
      info.innerHTML = `<div class="lc-name">${r.card.name}</div>
        <div class="lc-sub">#${r.card.number} · ${r.card.type}${r.card.domain ? ' · '+r.card.domain : ''}</div>
        <div class="lc-tags">
          <span class="lc-set" style="background:color-mix(in srgb,${r.set.color},transparent 80%);color:var(--text)">${r.set.abbr}</span>
          <span class="lc-set" style="background:var(--surface2);color:var(--muted)">${label}</span>
        </div>
        ${cmPrice ? `<div class="lc-price">${cmPrice}</div>` : ''}`;
      el.onclick = ()=>openPremiumModal(r.card, r.set);
    }

    el.appendChild(imgDiv);
    el.appendChild(info);
    grid.appendChild(el);
  }
}

// ===== CARDMARKET PRICES (loaded from cardmarket_prices.json) =====
let CARDMARKET_PRICES = {};

// ===== MODAL =====
function openModal(leg, set) {
  document.getElementById('modal-name').textContent = leg.name;
  document.getElementById('modal-set').textContent = `${set.name} (${set.abbr}) · ${leg.n||leg.title||''}`;
  document.getElementById('modal-desc').textContent = 'Leyenda de Riftbound.';
  const tags = document.getElementById('modal-tags');
  tags.innerHTML = `<span>${set.abbr}</span><span>Leyenda</span>`;

  const imgDiv = document.getElementById('modal-img');
  imgDiv.innerHTML = '';
  let imgUrl = leg.img || null;
  if (imgUrl) {
    const img = document.createElement('img');
    img.src = imgUrl;
    img.alt = leg.name;
    img.onerror = function(){ this.style.display='none'; this.parentElement.innerHTML='<div class="placeholder">?</div>'; };
    imgDiv.appendChild(img);
  } else {
    imgDiv.innerHTML = '<div class="placeholder">?</div>';
  }

  document.getElementById('modal').classList.add('active');
  const cmPrice = CARDMARKET_PRICES[set.id]?.[leg.name] || null;
  showCardmarketPrice(leg.name, cmPrice);
}

function openPremiumModal(card, set) {
  document.getElementById('modal-name').textContent = card.name;
  document.getElementById('modal-set').textContent = `${set.name} (${set.abbr}) · ${card.id.toUpperCase()}`;
  document.getElementById('modal-desc').textContent = `${premiumLabel(card)} · ${card.type}${card.domain ? ' · '+card.domain : ''}`;
  const tags = document.getElementById('modal-tags');
  tags.innerHTML = `<span>${set.abbr}</span><span>${card.rarity}</span><span>${card.type}</span>${card.domain ? `<span>${card.domain}</span>` : ''}`;

  const imgDiv = document.getElementById('modal-img');
  imgDiv.innerHTML = '';
  const img = document.createElement('img');
  img.src = card.image;
  img.alt = card.name;
  img.onerror = function(){ this.style.display='none'; this.parentElement.innerHTML='<div class="placeholder">?</div>'; };
  imgDiv.appendChild(img);

  document.getElementById('modal').classList.add('active');
  const cmPrice = CARDMARKET_PRICES[set.id]?.[card.id] || CARDMARKET_PRICES[set.id]?.[card.id.replace(/-\w+$/, '')] || CARDMARKET_PRICES[set.id]?.[card.name] || null;
  showCardmarketPrice(card.name, cmPrice);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

// ===== CARDMARKET PRICE DISPLAY =====
function showCardmarketPrice(name, price) {
  const priceEl = document.getElementById('price-value');
  if (price) {
    priceEl.innerHTML = `<span class="pl-f">${price}</span> <span class="pl-l">Cardmarket</span>`;
    return;
  }
  priceEl.innerHTML = `<span class="pl-na">No disponible</span>`;
}

// ===== DYNAMIC PAGE FROM cartas.json =====
async function buildPage() {
  let db = { sets: {}, pull_rates: {} };
  try {
    const resp = await fetch('cartas.json?' + Date.now());
    if (resp.ok) db = await resp.json();
  } catch(e) { console.warn('cartas.json not loaded, using default'); }
  window._db = db;

  // Load Cardmarket prices
  try {
    const cmResp = await fetch('cardmarket_prices.json?' + Date.now());
    if (cmResp.ok) CARDMARKET_PRICES = await cmResp.json();
  } catch(e) { console.warn('cardmarket_prices.json not loaded'); }

  // Load legend data (images, titles, numbers from DotGG)
  try {
    const ldResp = await fetch('legend_data.json?' + Date.now());
    if (ldResp.ok) LEGEND_DATA = await ldResp.json();
  } catch(e) { console.warn('legend_data.json not loaded'); }

  const sets = db.sets || {};
  const setIds = Object.keys(sets);

  // 1. Build nav items
  const navC = document.getElementById('nav-container');
  navC.innerHTML = '';
  const addNav = (label, ds, color, active) => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (active ? ' active' : '');
    el.dataset.set = ds;
    el.style.setProperty('--nav-c', color);
    el.innerHTML = `<span class="nav-dot" style="background:${color}"></span><span>${label}</span>`;
    navC.appendChild(el);
  };
  addNav('Visión general', 'all', 'var(--text)', true);
  for (const s of Object.values(sets)) {
    addNav(Object.keys(sets).find(k => sets[k]===s), s.id, s.color);
  }
  addNav('Pull Rates', 'rates', 'var(--pink)');

  // 2. Build Overview section
  const main = document.getElementById('sec-container');
  main.innerHTML = `
    <div class="global-search-bar">
      <input type="text" id="global-search-input" placeholder="Buscar en todas las colecciones…" oninput="globalSearch()" autocomplete="off">
    </div>
    <div class="global-results" id="global-results">
      <div class="sec-label" style="margin-top:0">Resultados globales</div>
      <div class="legend-grid" id="global-results-grid"></div>
    </div>
    <div class="section active" id="sec-all">
      <div class="set-header">
        <h2>Visión general</h2>
        <span class="set-badge" style="color:var(--text);border-color:var(--text);">${setIds.length} expansiones</span>
      </div>
      <div class="metrics-grid" id="overview-metrics"></div>
      <div class="sec-label">Leyendas por set</div>
      <div class="metrics-grid" id="legends-by-set"></div>

      <div class="sec-label">Anatomía del booster (14 cartas)</div>
      <div class="pack-grid">
        <div class="pack-slot" style="--accent:#888780"><div class="slot-count">7</div><div class="slot-name">Comunes</div></div>
        <div class="pack-slot" style="--accent:var(--green)"><div class="slot-count">3</div><div class="slot-name">Infrecuentes</div></div>
        <div class="pack-slot" style="--accent:var(--blue)"><div class="slot-count">2</div><div class="slot-name">Rara o mejor<br><span style="font-size:.58rem;color:var(--muted)">foil garantizado</span></div></div>
        <div class="pack-slot" style="--accent:var(--amber)"><div class="slot-count">1</div><div class="slot-name">Slot foil libre<br><span style="font-size:.58rem;color:var(--muted)">C → Épica/OVR</span></div></div>
        <div class="pack-slot" style="--accent:var(--pink)"><div class="slot-count">1</div><div class="slot-name">Token / Runa<br><span style="font-size:.58rem;color:var(--muted)">o Alt Runa</span></div></div>
      </div>

      <div class="sec-label">Overnumbered y Showcase por set</div>
      <div class="chart-box"><div style="position:relative;height:220px;"><canvas id="ovrChartOverview"></canvas></div></div>

      <div class="sec-label">Probabilidad acumulada por caja (24 packs)</div>
      <div class="two-col">
        <div class="chart-box">
          <div class="chart-title">% de conseguir 1+ pull por caja</div>
          <div style="position:relative;height:180px;"><canvas id="probChartOverview"></canvas></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">Packs necesarios (media) para 1 pull</div>
          <div style="position:relative;height:180px;"><canvas id="packsChartOverview"></canvas></div>
        </div>
      </div>

    </div>`;

  for (const k of setIds) {
    const s = sets[k];
    const om = document.createElement('div');
    om.className = 'mcard'; om.style.setProperty('--accent', s.color);
    const revealed = s.cartas_reveladas || s.total || 0;
    om.innerHTML = `<div class="mcard-label">${k} · ${s.date}</div><div class="mcard-num">${revealed}</div><div class="mcard-sub">${s.total_base} base + ${s.total_ovr} premium · ${s.legend_count} leyendas</div>`;
    document.getElementById('overview-metrics').appendChild(om);
    const lb = document.createElement('div');
    lb.className = 'mcard'; lb.style.setProperty('--accent', s.color);
    lb.innerHTML = `<div class="mcard-label">${k} · ${s.date}</div><div class="mcard-num">${s.legend_count}</div><div class="mcard-sub">${s.leyendas.map(l => typeof l === 'string' ? l : l.name).join(' · ')}</div>`;
    document.getElementById('legends-by-set').appendChild(lb);
  }

  // 3. Build per-set sections
  const tabIds = {}; // track tab IDs for click handler
  for (const k of setIds) {
    const s = sets[k];
    const sfx = s.id[0];
    const sec = document.createElement('div');
    sec.className = 'section'; sec.id = 'sec-' + s.id;

    const ovrTab = s.ovr_breakdown && s.ovr_breakdown.length > 0;

    let html = `
      <div class="set-header">
        <h2>${k}</h2>
        <span class="set-badge" style="color:${s.color};border-color:${s.color};">Set ${s.set_number}</span>
        <span class="set-date">${s.date}</span>
        <span class="set-total"><strong>${s.total_base}</strong> base + <strong>${s.total_ovr}</strong> premium</span>
      </div>`;
    html += `<div class="sub-tabs">
      <div class="sub-tab active" data-tab="legends-${sfx}">Leyendas (${s.legend_count})</div>
      <div class="sub-tab" data-tab="epic-${sfx}">Épicas+</div>`;
    if (ovrTab) html += `<div class="sub-tab" data-tab="showcase-${sfx}">Showcase &amp; Premium</div>`;
    html += `<div class="sub-tab" data-tab="info-${sfx}">Información</div></div>`;

    // Legend tab
    html += `<div class="sub-tab-content active" id="tab-legends-${sfx}">
      <div class="search-bar"><input type="text" id="search-${sfx}" placeholder="Buscar leyenda…" oninput="filterLegends('${sfx}',this.value)"></div>
      <div class="legend-grid" id="grid-${sfx}"></div></div>`;

    // Epic tab
    html += `<div class="sub-tab-content" id="tab-epic-${sfx}">
      <div class="search-bar">
        <input type="text" placeholder="Buscar carta..." oninput="filterPremium('${sfx}')">
        <select onchange="filterPremium('${sfx}')">
          <option value="">Todas</option><option value="Epic">Epicas</option><option value="Showcase">Showcase / OVR</option>
        </select>
        <select class="sort-price" onchange="filterPremium('${sfx}')">
          <option value="">Orden</option>
          <option value="asc">Precio ↑</option>
          <option value="desc">Precio ↓</option>
        </select>
      </div>
      <div class="count-note" id="epic-count-${sfx}"></div>
      <div class="legend-grid" id="grid-epic-${sfx}"></div></div>`;

    // OVR/Showcase tab
    if (ovrTab) {
      html += `<div class="sub-tab-content" id="tab-showcase-${sfx}">
        <div class="table-wrap"><table>
          <thead><tr><th>Tipo</th><th>Cantidad</th><th>Numeración</th><th>Notas</th></tr></thead>
          <tbody>${s.ovr_breakdown.map(r => { const c = r.cantidad; const disp = (c === 'N' || c === 'n' || c == null) ? '?' : c; return `<tr${r.tipo.includes('Ultimate') ? ' style="color:var(--red)"' : ''}><td class="row-label">${r.tipo}</td><td>${disp}</td><td>${r.numeracion}</td><td>${r.notas}</td></tr>`; }).join('')}</tbody>
        </table></div></div>`;
    }

    // Info tab
    html += `<div class="sub-tab-content" id="tab-info-${sfx}">
      <div class="metrics-grid">
        <div class="mcard" style="--accent:${s.color}"><div class="mcard-label">Total cartas</div><div class="mcard-num">${s.total}</div><div class="mcard-sub">${s.total_base} base + ${s.total_ovr} premium</div></div>
        <div class="mcard" style="--accent:${s.color}"><div class="mcard-label">Leyendas</div><div class="mcard-num">${s.legend_count}</div></div>`;
    if (s.champion_decks && s.champion_decks.length > 0) {
      html += `<div class="mcard" style="--accent:${s.color}"><div class="mcard-label">Champion Decks</div><div class="mcard-num">${s.champion_decks.length}</div><div class="mcard-sub">${s.champion_decks.join(' · ')}</div></div>`;
    }
    html += `</div>`;
    if (s.mecanicas && s.mecanicas.length > 0) {
      html += `<div class="sec-label">Mecánicas</div><div class="mechanics-grid">`;
      for (const m of s.mecanicas) {
        html += `<div class="mechanic-card" style="--accent:${s.color}"><div class="mechanic-kicker">${m.kicker}</div><div class="mechanic-name">${m.name}</div><div class="mechanic-desc">${m.desc}</div></div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
    sec.innerHTML = html;
    main.appendChild(sec);
  }

  // 4. Populate Pull Rates table
  if (db.pull_rates && db.pull_rates.per_box) {
    const prHead = document.getElementById('pr-head');
    if (prHead) {
      const headRow = prHead.querySelector('tr');
      for (const sn of setIds) {
        const th = document.createElement('th');
        // use the first abbr found from sets that matches this key
        const sObj = sets[sn] || Object.values(sets).find(s => s.id === sn);
        th.textContent = sObj ? (sObj.name || sn) : sn;
        headRow.appendChild(th);
      }
    }
    const prBody = document.getElementById('pr-body');
    if (prBody) {
      const labelMap = { Epic:'Épica', Showcase:'Showcase / Alt-Art', Overnumbered:'Overnumbered', Signature:'OVR con firma', Ultimate_Rare:'Ultimate Rare' };
      for (const [rarity, perSet] of Object.entries(db.pull_rates.per_box)) {
        const tr = document.createElement('tr');
        let cells = `<td class="row-label">${labelMap[rarity]||rarity}</td>`;
        for (const sn of setIds) {
          const v = perSet[sn];
          if (!v || v === 'Sin publicar') cells += `<td><span class="tbd">Sin publicar</span></td>`;
          else if (v === 'No existe') cells += `<td><span class="pill pill-dim">No existe</span></td>`;
          else if (v === 'Sin confirmar') cells += `<td><span class="tbd">Sin confirmar</span></td>`;
          else cells += `<td>${v}</td>`;
        }
        tr.innerHTML = cells;
        prBody.appendChild(tr);
      }
    }
  }

  // 5. Sync SETS and PREMIUM_SET_PREFIX from JSON
  for (const [setName, s] of Object.entries(sets)) {
    if (!SETS[s.id]) {
      const setLegendData = LEGEND_DATA[s.id] || {};
      SETS[s.id] = {
        id: s.id, name: setName, abbr: s.abbr, color: s.color,
        legends: (s.leyendas || []).map(l => {
          const legendName = typeof l === 'string' ? l : l.name || '';
          const extra = setLegendData[legendName] || {};
          if (typeof l === 'string') {
            return { name: legendName, title: extra.title || '', n: extra.number || '', img: extra.img || null };
          }
          return {
            name: legendName,
            title: l.title || extra.title || '',
            n: extra.number || '',
            img: l.img || extra.img || null
          };
        }),
        imgBase: s.imgBase || null
      };
    }
    PREMIUM_SET_PREFIX[s.abbr] = s.id[0];
  }
}

// ===== NAV (delegation for dynamic nav-items) =====
document.addEventListener('click', function(e) {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.global-results, .global-search-bar').forEach(s=>s.classList.remove('active'));
  item.classList.add('active');
  const el = document.getElementById('sec-'+item.dataset.set);
  if (el) el.classList.add('active');
  // Auto-scroll the sidebar to center the clicked item (mobile)
  const sidebar = document.querySelector('.sidebar');
  if (sidebar && window.innerWidth < 768) {
    item.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }
  setTimeout(()=>{ window.dispatchEvent(new Event('resize')); },100);
});

// ===== SUB TABS (delegation) =====
document.addEventListener('click', function(e) {
  const tab = e.target.closest('.sub-tab');
  if (!tab) return;
  const container = tab.parentElement;
  container.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  const target = tab.dataset.tab;
  container.parentElement.querySelectorAll('.sub-tab-content').forEach(c=>c.classList.remove('active'));
  const el = document.getElementById('tab-'+target);
  if (el) el.classList.add('active');
});

// ===== CHART HELPERS =====
function perBoxVal(t) {
  if (!t) return 0; t = String(t);
  let m = t.match(/~?(\d+)\s*por caja/);
  if (m) return +m[1];
  m = t.match(/~?(\d+)[–-](\d+)\s*por caja/);
  if (m) return (+m[1] + +m[2]) / 2;
  m = t.match(/([\d.]+)\s*en\s*([\d.]+)\s*(?:cajas?|sobres?)/);
  if (m) { const v = +m[1] / +m[2]; return m[3].startsWith('s') ? v * 24 : v; }
  m = t.match(/([\d.]+)\s*cada\s*([\d.]+)\s*cajas?/);
  if (m) return +m[1] / +m[2];
  m = t.match(/<([\d.]+)%/);
  if (m) return +m[1] / 100 * 24;
  return 0;
}
function avgPerBox(rarity, perBox) {
  const vals = Object.values(perBox[rarity] || {}).map(perBoxVal).filter(v => v > 0);
  return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
}
function normCat(t) {
  const s = t.toLowerCase();
  if (s.includes('ultimate')) return 'Ultimate Rare';
  if (s.includes('firma') || s.includes('signed')) return 'OVR firma';
  if (s.includes('ovr') || s.includes('over')) return 'OVR base';
  return 'Showcase / Alt-Art';
}
function getChartData(db) {
  const pr = db.pull_rates && db.pull_rates.per_box;
  if (!pr) return null;
  const labelMap = { Epic:'Épica', Showcase:'Showcase / Alt-Art', Overnumbered:'OVR', Signature:'OVR firma', Ultimate_Rare:'Ultimate' };
  const colorMap = { Epic:'#4a9eff', Showcase:'#3ecf8e', Overnumbered:'#f4a535', Signature:'#e879a0', Ultimate_Rare:'#f05252' };
  const order = Object.keys(pr).filter(k => k !== 'rareza');
  const labels = order.map(r => labelMap[r] || r);
  const colors = order.map(r => colorMap[r] || '#888780');
  const λ = order.map(r => avgPerBox(r, pr));
  return {
    prob: λ.map(v => v > 0 ? +(100 * (1 - Math.exp(-v))).toFixed(1) : 0),
    packs: λ.map(v => v > 0 ? Math.round(24 / v) : 0),
    labels, colors
  };
}

// ===== CHARTS =====
const gridColor = 'rgba(255,255,255,0.05)';
const tickColor = '#6b6a65';
Chart.defaults.color = tickColor;
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 11;

function buildChart(id, type, labels, datasets, opts={}) {
  const ctx = document.getElementById(id);
  if(!ctx) return null;
  return new Chart(ctx, {
    type, data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:opts.tooltipLabel?{label:opts.tooltipLabel}:undefined}
      },
      scales:{
        x:{ticks:{color:tickColor},grid:{color:gridColor}},
        y:{ticks:{color:tickColor,...(opts.yTicks||{})},grid:{color:gridColor},
           title:opts.yTitle?{display:true,text:opts.yTitle,color:tickColor}:undefined}
      },
      ...opts.extra
    }
  });
}

// Probability charts
function makeProbChart(id, data, labels, colors, horiz) {
  const ctx = document.getElementById(id);
  if(!ctx) return;
  const valueAxis = horiz ? 'x' : 'y';
  const labelAxis = horiz ? 'y' : 'x';
  new Chart(ctx, {
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'% por caja',
        data,
        backgroundColor:colors,
        borderRadius:4
      }]
    },
    options:{
      indexAxis:horiz?'y':undefined,
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>' '+c.parsed[valueAxis].toFixed(1)+'%'}}},
      scales:{
        [valueAxis]:{max:110,ticks:{color:tickColor,callback:v=>v+'%'},grid:{color:gridColor}},
        [labelAxis]:{ticks:{color:tickColor},grid:{display:false}}
      }
    }
  });
}

function makePacksChart(id, data, labels, colors, horiz) {
  const ctx = document.getElementById(id);
  if(!ctx) return;
  const valueAxis = horiz ? 'x' : 'y';
  const labelAxis = horiz ? 'y' : 'x';
  new Chart(ctx, {
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'packs necesarios',
        data,
        backgroundColor:colors,
        borderRadius:4
      }]
    },
    options:{
      indexAxis:horiz?'y':undefined,
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>' ~'+c.parsed[valueAxis].toLocaleString()+' packs'}}},
      scales:{
        [valueAxis]:{type:'logarithmic',
           ticks:{color:tickColor,callback:v=>v>=1000?'1k+':v},
           grid:{color:gridColor}},
        [labelAxis]:{ticks:{color:tickColor},grid:{display:false}}
      }
    }
  });
}

// ===== INIT (after buildPage creates DOM) =====
buildPage().then(() => {
  Object.keys(SETS).forEach(renderSet);
  Object.keys(PREMIUM_SET_PREFIX).forEach(renderPremiumSet);

  // Charts (must run after DOM is built)
  const cd = getChartData(window._db);
  if (cd) {
    makeProbChart('probChartOverview', cd.prob, cd.labels, cd.colors);
    makePacksChart('packsChartOverview', cd.packs, cd.labels, cd.colors);
    makeProbChart('probChartRates', cd.prob, cd.labels, cd.colors, true);
    makePacksChart('packsChartRates', cd.packs, cd.labels, cd.colors, true);
  }

  // OVR chart by set
  const ovrCtx = document.getElementById('ovrChartOverview');
  if(ovrCtx) {
    const sets = window._db.sets || {};
    const ovrSetIds = Object.keys(sets).filter(k => sets[k].ovr_breakdown && sets[k].ovr_breakdown.length);
    if (ovrSetIds.length) {
      const catSet = {};
      for (const sk of ovrSetIds) {
        for (const item of sets[sk].ovr_breakdown) {
          const cat = normCat(item.tipo);
          if (!catSet[cat]) catSet[cat] = { label: cat, data: new Array(ovrSetIds.length).fill(0), backgroundColor: { 'OVR base': '#4a9eff', 'OVR firma': '#85b7eb', 'Showcase / Alt-Art': '#3ecf8e', 'Ultimate Rare': '#f05252' }[cat] || '#888780' };
          const val = parseInt(item.cantidad, 10);
          catSet[cat].data[ovrSetIds.indexOf(sk)] += isNaN(val) ? 0 : val;
        }
      }
      new Chart(ovrCtx, {
        type:'bar',
        data:{ labels: ovrSetIds, datasets: Object.values(catSet) },
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{ticks:{color:tickColor},grid:{color:gridColor}},
            y:{ticks:{color:tickColor,stepSize:5},grid:{color:gridColor},
               title:{display:true,text:'cartas',color:tickColor}}
          }
        }
      });
    }
  }
});
</script>
