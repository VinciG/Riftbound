name: Daily Riftbound Update

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install google-genai

      - name: Run updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python update_web.py

      - name: Commit changes
        run: |
          git config user.name "Riftbound Bot"
          git config user.email "actions@github.com"

          git add index.html

          git diff --cached --quiet || git commit -m "Auto update Riftbound database"

      - name: Push
        run: |
          git push
