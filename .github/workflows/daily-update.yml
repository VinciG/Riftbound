name: AI Daily Update

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-genai

      - name: Ejecutar script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_web.py

      - name: Commit y push
        run: |
          git config user.name "Riftbound AI Bot"
          git config user.email "bot@riftbound.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🤖 AI update $(date +'%Y-%m-%d')"
          git push
